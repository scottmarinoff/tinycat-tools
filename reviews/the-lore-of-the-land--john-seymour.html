assic scholarly examination of Celtic supernatural beliefs across the British Isles and Brittany."},{"title":"Albion: A Guide to Legendary Britain","author":"Jennifer Westwood","reason":"Another geographical exploration of British legends and mythical sites, organized by location."}]};
