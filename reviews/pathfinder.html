<script>
  const TINYCAT_BASE = "https://www.librarycat.org/lib/dispensed_snores";
  const storedData = {"review":"## Overview\n\n*Pathfinder* (2010) is a science fiction novel by Orson Scott Card that follows Rigg, a young man who discovers he has the ability to see the paths that people and animals have traveled through time. Set on a planet called Garden, the story blends time manipulation, political intrigue, and coming-of-age themes as Rigg uncovers secrets about his world's true nature and his own mysterious origins.\n\n## Critical Reception\n\nThe novel received generally positive reviews, with critics praising Card's return to the complex world-building that characterized his earlier works.<sup>[1]</sup> Readers appreciated the intricate time-travel mechanics and the intellectually stimulating puzzles woven throughout the narrative. Some reviewers noted that the pacing could feel slow in places, as Card dedicates significant attention to explaining the scientific and philosophical underpinnings of the story.<sup>[2]</sup> The book was well-received by young adult audiences while also appealing to Card's established adult readership.\n\n## Review Voices\n\n**The Science Fiction Enthusiast**: The time-path concept is genuinely innovative, and Card handles the paradoxes with impressive logical consistency.\n\n**The Young Adult Reader**: Rigg is a compelling protagonist whose journey of self-discovery feels authentic, even amid all the complex sci-fi elements.\n\n**The Literary Critic**: While the novel occasionally prioritizes exposition over emotional depth, it demonstrates Card's signature ability to craft philosophically rich speculative fiction.<sup>[1]</sup>\n\n**The Casual Reader**: The slow build-up pays off, but readers should be prepared for a story that demands attention and patience.\n\n## Bottom Line\n\n*Pathfinder* is an ambitious and thought-provoking science fiction novel that rewards patient readers with its intricate plotting and inventive time-manipulation concepts.","footnotes":["Publishers Weekly, 2010","Kirkus Reviews, 2010"],"related":[{"title":"Ender's Game","author":"Orson Scott Card","reason":"Card's most celebrated work shares similar themes of gifted young protagonists navigating complex moral landscapes."},{"title":"A Wrinkle in Time","author":"Madeleine L'Engle","reason":"Another young adult science fiction classic featuring young people, time manipulation, and journeys of discovery."},{"title":"The House of the Scorpion","author":"Nancy Farmer","reason":"A science fiction coming-of-age story that similarly explores identity, destiny, and political intrigue in a richly built world."}]};
  const fullMd = "## Overview\n\n*Pathfinder* (2010) is a science fiction novel by Orson Scott Card that follows Rigg, a young man who discovers he has the ability to see the paths that people and animals have traveled through time. Set on a planet called Garden, the story blends time manipulation, political intrigue, and coming-of-age themes as Rigg uncovers secrets about his world's true nature and his own mysterious origins.\n\n## Critical Reception\n\nThe novel received generally positive reviews, with critics praising Card's return to the complex world-building that characterized his earlier works.<sup>[1]</sup> Readers appreciated the intricate time-travel mechanics and the intellectually stimulating puzzles woven throughout the narrative. Some reviewers noted that the pacing could feel slow in places, as Card dedicates significant attention to explaining the scientific and philosophical underpinnings of the story.<sup>[2]</sup> The book was well-received by young adult audiences while also appealing to Card's established adult readership.\n\n## Review Voices\n\n**The Science Fiction Enthusiast**: The time-path concept is genuinely innovative, and Card handles the paradoxes with impressive logical consistency.\n\n**The Young Adult Reader**: Rigg is a compelling protagonist whose journey of self-discovery feels authentic, even amid all the complex sci-fi elements.\n\n**The Literary Critic**: While the novel occasionally prioritizes exposition over emotional depth, it demonstrates Card's signature ability to craft philosophically rich speculative fiction.<sup>[1]</sup>\n\n**The Casual Reader**: The slow build-up pays off, but readers should be prepared for a story that demands attention and patience.\n\n## Bottom Line\n\n*Pathfinder* is an ambitious and thought-provoking science fiction novel that rewards patient readers with its intricate plotting and inventive time-manipulation concepts.\n\n<div class=\"footnotes\">\n\n1. Publishers Weekly, 2010\n2. Kirkus Reviews, 2010\n\n</div>";
