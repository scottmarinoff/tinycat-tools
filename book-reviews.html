<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Reviews</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1612;
      --paper:  #f5f0e8;
      --muted:  #7a6f62;
      --rule:   #d4c9b8;
      --accent: #8b3a2a;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page { max-width: 660px; margin: 0 auto; }

    header {
      border-bottom: 2px solid var(--ink);
      padding-bottom: 0.75rem;
      margin-bottom: 1.75rem;
    }
    header h1 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #book-info { margin-bottom: 1.75rem; }
    #book-title {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.3rem;
    }
    #book-author { font-size: 1rem; color: var(--muted); font-style: italic; }

    .settings-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .settings-row label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      width: 6.5rem;
      flex-shrink: 0;
    }
    .settings-row input {
      flex: 1;
      min-width: 180px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.9rem;
      padding: 0.38rem 0.65rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .settings-row input:focus { border-color: var(--accent); }

    #repo-resolved {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      padding-left: 7rem;
      font-family: monospace;
      display: none;
    }
    #repo-resolved.visible { display: block; }
    #repo-resolved.bad { color: var(--accent); }

    #btn-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      margin-bottom: 1.5rem;
    }
    button.action {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.45rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button.action:hover { opacity: 0.85; }
    button.action:disabled { opacity: 0.45; cursor: not-allowed; }

    #notice {
      padding: 0.6rem 0.9rem;
      border-radius: 3px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    #notice.info  { display: block; background: #e8f0fb; color: #1a4a8a; border: 1px solid #b8d0f0; }
    #notice.good  { display: block; background: #e8f5e9; color: #1b5e20; border: 1px solid #b2dfdb; }
    #notice.error { display: block; background: #fdecea; color: var(--accent); border: 1px solid #f5c6c0; }

    #status { font-size: 0.9rem; color: var(--muted); min-height: 1.4rem; margin-bottom: 0.5rem; }

    .skeleton-wrap { display: none; }
    .skeleton-wrap.visible { display: block; }
    .skel {
      height: 0.9rem;
      background: linear-gradient(90deg, var(--rule) 25%, #e8e2d6 50%, var(--rule) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 2px;
      margin-bottom: 0.65rem;
    }
    .skel.w-full { width: 100%; }
    .skel.w-90   { width: 90%; }
    .skel.w-75   { width: 75%; }
    .skel.w-60   { width: 60%; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .rule { border: none; border-top: 1px solid var(--rule); margin: 1.2rem 0; }

    #output { display: none; }
    #output.visible { display: block; }

    #output h1, #output h2, #output h3 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-weight: 700;
      margin-top: 1.6rem;
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }
    #output h1 { font-size: 1.35rem; }
    #output h2 { font-size: 1.15rem; border-bottom: 1px solid var(--rule); padding-bottom: 0.25rem; }
    #output h3 { font-size: 1rem; color: var(--muted); }
    #output p  { margin-bottom: 0.85rem; }
    #output strong { font-weight: 700; }
    #output em     { font-style: italic; }
    #output ul, #output ol { margin: 0 0 0.85rem 1.4rem; }
    #output li { margin-bottom: 0.3rem; }
    #output hr { border: none; border-top: 1px solid var(--rule); margin: 1.2rem 0; }
    #output blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      color: var(--muted);
      font-style: italic;
      margin: 0.85rem 0;
    }
    #output sup {
      font-size: 0.7rem;
      vertical-align: super;
      line-height: 0;
      color: var(--accent);
    }
    #output a { color: var(--accent); text-decoration: none; }
    #output a:hover { text-decoration: underline; }
    #output .footnotes {
      margin-top: 1.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--rule);
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
    }

    #related { display: none; margin-top: 1.5rem; }
    #related.visible { display: block; }
    #related h2 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 700;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.25rem;
      margin-bottom: 0.9rem;
    }
    .related-book {
      margin-bottom: 1rem;
      padding-left: 0.75rem;
      border-left: 2px solid var(--rule);
    }
    .related-book .rb-title {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-weight: 700;
      font-size: 0.98rem;
    }
    .related-book .rb-author { font-size: 0.88rem; color: var(--muted); margin-bottom: 0.2rem; }
    .related-book .rb-reason { font-size: 0.9rem; margin-bottom: 0.3rem; }
    .related-book .rb-link {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }
    .related-book .rb-link:hover { text-decoration: underline; }

    #saved-badge {
      display: none;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #1b5e20;
      margin-top: 1rem;
    }
    #saved-badge.visible { display: block; }
  </style>
</head>
<body>
<div class="page">

  <header><h1>Book Review Summary</h1></header>

  <div id="book-info">
    <div id="book-title">—</div>
    <div id="book-author"></div>
  </div>

  <div class="settings-row">
    <label for="api-key-input">Claude Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-…" autocomplete="off" spellcheck="false" />
  </div>
  <div class="settings-row">
    <label for="gh-token-input">GitHub Token</label>
    <input type="password" id="gh-token-input" placeholder="ghp_…" autocomplete="off" spellcheck="false" />
  </div>
  <div class="settings-row">
    <label for="gh-repo-input">GitHub Repo</label>
    <input type="text" id="gh-repo-input" placeholder="username/repo  or  full GitHub URL" autocomplete="off" spellcheck="false" />
  </div>
  <div id="repo-resolved"></div>

  <div id="btn-row">
    <button class="action" id="generate-btn">Get Reviews</button>
  </div>

  <div id="notice"></div>
  <div id="status"></div>

  <div class="skeleton-wrap" id="skeleton">
    <div class="skel w-full"></div><div class="skel w-90"></div>
    <div class="skel w-75"></div><div class="skel w-full"></div>
    <div class="skel w-60"></div><div class="skel w-90"></div>
    <div class="skel w-full"></div><div class="skel w-75"></div>
  </div>

  <hr class="rule" />
  <div id="output"></div>
  <div id="related"></div>
  <div id="saved-badge">✓ Saved to reviews/</div>

</div>
<script>
  const TINYCAT_BASE = "https://www.librarycat.org/lib/dispensed_snores";

  // ── Repo normalization ─────────────────────────────────────────────────────
  // Handles all of these:
  //   scottmarinoff/tinycat-tools
  //   https://github.com/scottmarinoff/tinycat-tools
  //   https://github.com/scottmarinoff/tinycat-tools/
  //   github.com/scottmarinoff/tinycat-tools
  function normalizeRepo(raw) {
    const s = raw.trim();
    if (!s) return "";
    // Extract owner/repo from any URL containing github.com
    const urlMatch = s.match(/github\.com[/:]([^/\s]+)\/([^/\s?#]+)/i);
    if (urlMatch) return urlMatch[1] + "/" + urlMatch[2].replace(/\.git$/, "");
    // Already in owner/repo form (contains exactly one slash, no protocol)
    if (/^[^/\s]+\/[^/\s]+$/.test(s)) return s;
    return s; // pass through and let the API surface the error
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function slugify(str) {
    return str.toLowerCase()
      .replace(/[^\w\s-]/g, "")
      .replace(/\s+/g, "-")
      .replace(/-+/g, "-")
      .trim();
  }

  function reviewFilename(t, a) {
    const parts = [slugify(t)];
    if (a) parts.push(slugify(a));
    return "reviews/" + parts.join("--") + ".html";
  }

  function setStatus(msg) { document.getElementById("status").textContent = msg; }

  function showNotice(msg, type) {
    const el = document.getElementById("notice");
    el.textContent = msg;
    el.className = type;
  }

  function hideNotice() { document.getElementById("notice").className = ""; }

  function renderMarkdown(text) {
    const out = document.getElementById("output");
    out.innerHTML = marked.parse(text);
    out.classList.add("visible");
  }

  function tinycatUrl(bookTitle) {
    return TINYCAT_BASE + "/search?search_type=title&search=" + encodeURIComponent(bookTitle);
  }

  function escHtml(str) {
    return String(str || "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // ── Resolved repo display ──────────────────────────────────────────────────
  const ghRepoInput = document.getElementById("gh-repo-input");
  const repoDisplay = document.getElementById("repo-resolved");

  function updateRepoDisplay() {
    const raw  = ghRepoInput.value.trim();
    if (!raw) { repoDisplay.className = ""; return; }
    const norm = normalizeRepo(raw);
    const ok   = /^[^/\s]+\/[^/\s]+$/.test(norm);
    repoDisplay.textContent = "→ " + (norm || "(invalid)");
    repoDisplay.className   = ok ? "visible" : "visible bad";
  }

  ghRepoInput.addEventListener("input", updateRepoDisplay);

  // ── Query params ───────────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const title  = params.get("title")  || "";
  const author = params.get("author") || "";

  document.getElementById("book-title").textContent  = title  || "Unknown Title";
  document.getElementById("book-author").textContent = author ? "by " + author : "";

  // ── Restore credentials ────────────────────────────────────────────────────
  const keyInput = document.getElementById("api-key-input");
  const ghToken  = document.getElementById("gh-token-input");

  if (localStorage.getItem("claude_api_key")) keyInput.value    = localStorage.getItem("claude_api_key");
  if (localStorage.getItem("gh_token"))       ghToken.value     = localStorage.getItem("gh_token");
  if (localStorage.getItem("gh_repo"))        ghRepoInput.value = localStorage.getItem("gh_repo");
  updateRepoDisplay();

  // ── GitHub API ─────────────────────────────────────────────────────────────
  function getRepo() { return normalizeRepo(ghRepoInput.value); }

  function ghHeaders() {
    return {
      "Authorization": "Bearer " + ghToken.value.trim(),
      "Accept": "application/vnd.github+json"
    };
  }

  async function ghGet(path) {
    return fetch(`https://api.github.com/repos/${getRepo()}/contents/${path}`, {
      headers: ghHeaders()
    });
  }

  async function ghPut(path, content) {
    const body = {
      message: `Add review: ${title}${author ? " by " + author : ""}`,
      content: btoa(unescape(encodeURIComponent(content)))
    };
    return fetch(`https://api.github.com/repos/${getRepo()}/contents/${path}`, {
      method: "PUT",
      headers: { ...ghHeaders(), "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
  }

  // ── Claude prompt ──────────────────────────────────────────────────────────
  function buildPrompt() {
    const bookRef = author ? `"${title}" by ${author}` : `"${title}"`;
    return `You are a knowledgeable literary critic. For the book ${bookRef}, return ONLY a valid JSON object with no markdown fences, no commentary, no text before or after. The JSON must have exactly these three keys:

{
  "review": "<markdown string>",
  "footnotes": ["<source 1>", "<source 2>"],
  "related": [
    {"title": "<title>", "author": "<author>", "reason": "<one sentence>"}
  ]
}

Requirements for each field:

"review": A markdown string with these four ## sections:
  ## Overview — 2-3 sentences about what the book is.
  ## Critical Reception — 3-5 sentences on critical and reader response. Where you cite a source, insert a superscript reference inline like this exact HTML: <sup>[1]</sup> (using the 1-based index into the footnotes array).
  ## Review Voices — 3-4 short paraphrased takes from different reader types. Bold each label like **The Literary Critic**. Add footnote refs where appropriate.
  ## Bottom Line — one sentence verdict.
  IMPORTANT: The "review" value must be a valid JSON string. Escape all double quotes inside it as \\". Do not use backticks. Do not use newlines literally — use \\n instead.

"footnotes": Array of strings, each a real verifiable source in the format "Reviewer Name, Publication, Year". Only include sources you are confident are accurate. Omit uncertain ones. Empty array [] if none.

"related": Array of up to 3 objects. If the book is fiction, recommend similar novels or story collections. If nonfiction, recommend related books on the same subject or theme. Each object has "title", "author", and "reason" (one sentence explaining the connection). Empty array [] if you have no confident recommendations.`;
  }

  // ── Parse Claude's JSON response robustly ─────────────────────────────────
  function parseClaudeResponse(raw) {
    // 1. Strip markdown fences if present
    let text = raw.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/i, "").trim();

    // 2. Try direct parse first
    try { return JSON.parse(text); } catch(e1) {}

    // 3. Extract just the outermost {...} block and try again
    const brace = text.indexOf("{");
    const last  = text.lastIndexOf("}");
    if (brace !== -1 && last !== -1) {
      try { return JSON.parse(text.slice(brace, last + 1)); } catch(e2) {}
    }

    // 4. Give up — return a best-effort object with the raw text as review
    return { review: text, footnotes: [], related: [] };
  }

  // ── Footnotes markdown ─────────────────────────────────────────────────────
  function buildFootnotesMd(footnotes) {
    if (!footnotes || footnotes.length === 0) return "";
    const lines = footnotes.map((f, i) => `${i + 1}. ${f}`).join("\n");
    return `\n\n<div class="footnotes">\n\n${lines}\n\n</div>`;
  }

  // ── Related books renderer ─────────────────────────────────────────────────
  function renderRelated(books) {
    const container = document.getElementById("related");
    if (!books || books.length === 0) { container.classList.remove("visible"); return; }
    container.innerHTML = "<h2>You Might Also Like</h2>";
    books.forEach(b => {
      const div = document.createElement("div");
      div.className = "related-book";
      div.innerHTML =
        `<div class="rb-title">${escHtml(b.title)}</div>` +
        `<div class="rb-author">${escHtml(b.author)}</div>` +
        `<div class="rb-reason">${escHtml(b.reason)}</div>` +
        `<a class="rb-link" href="${tinycatUrl(b.title)}" target="_blank" rel="noopener">Search in My Library ↗</a>`;
      container.appendChild(div);
    });
    container.classList.add("visible");
  }

  // ── Extract stored data from saved review HTML ─────────────────────────────
  function extractStoredData(html) {
    // New format: const storedData = {...};
    const m1 = html.match(/const storedData = (\{[\s\S]*?\});\s*\n/);
    if (m1) { try { return JSON.parse(m1[1]); } catch(e) {} }
    // Legacy format: const md = "...";
    const m2 = html.match(/const md = ("[\s\S]*?");\s*\n/);
    if (m2) { try { return { review: JSON.parse(m2[1]), footnotes: [], related: [] }; } catch(e) {} }
    return null;
  }

  // ── Build saved review HTML ────────────────────────────────────────────────
  function buildReviewHtml(reviewMd, footnotes, related) {
    const bookRef  = author ? `${title} by ${author}` : title;
    const fullMd   = reviewMd + buildFootnotesMd(footnotes);
    const dataJson = JSON.stringify({ review: reviewMd, footnotes: footnotes || [], related: related || [] });

    return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Review: ${escHtml(bookRef)}</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"><\/script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#1a1612;--paper:#f5f0e8;--muted:#7a6f62;--rule:#d4c9b8;--accent:#8b3a2a}
    body{background:var(--paper);color:var(--ink);font-family:'Source Sans 3',sans-serif;font-size:16px;line-height:1.6;min-height:100vh;padding:2rem 1rem 4rem}
    .page{max-width:660px;margin:0 auto}
    header{border-bottom:2px solid var(--ink);padding-bottom:.75rem;margin-bottom:1.75rem}
    header h1{font-family:'Libre Baskerville',Georgia,serif;font-size:1.1rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    #output h1,#output h2,#output h3{font-family:'Libre Baskerville',Georgia,serif;font-weight:700;margin-top:1.6rem;margin-bottom:.4rem;line-height:1.3}
    #output h1{font-size:1.35rem} #output h2{font-size:1.15rem;border-bottom:1px solid var(--rule);padding-bottom:.25rem}
    #output h3{font-size:1rem;color:var(--muted)} #output p{margin-bottom:.85rem}
    #output strong{font-weight:700} #output em{font-style:italic}
    #output ul,#output ol{margin:0 0 .85rem 1.4rem} #output li{margin-bottom:.3rem}
    #output sup{font-size:.7rem;vertical-align:super;line-height:0;color:var(--accent)}
    #output a{color:var(--accent);text-decoration:none} #output a:hover{text-decoration:underline}
    .footnotes{margin-top:1.5rem;padding-top:.75rem;border-top:1px solid var(--rule);font-size:.82rem;color:var(--muted);line-height:1.5}
    #related{margin-top:1.5rem} #related h2{font-family:'Libre Baskerville',Georgia,serif;font-size:1.15rem;font-weight:700;border-bottom:1px solid var(--rule);padding-bottom:.25rem;margin-bottom:.9rem}
    .related-book{margin-bottom:1rem;padding-left:.75rem;border-left:2px solid var(--rule)}
    .rb-title{font-family:'Libre Baskerville',Georgia,serif;font-weight:700;font-size:.98rem}
    .rb-author{font-size:.88rem;color:var(--muted);margin-bottom:.2rem}
    .rb-reason{font-size:.9rem;margin-bottom:.3rem}
    .rb-link{font-size:.8rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);text-decoration:none}
    .rb-link:hover{text-decoration:underline}
    .meta{font-size:.8rem;color:var(--muted);margin-top:2rem}
  </style>
</head>
<body>
<div class="page">
  <header><h1>Book Review Summary</h1></header>
  <div id="output"></div>
  <div id="related"></div>
  <p class="meta">Generated ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}</p>
</div>
<script>
  const TINYCAT_BASE = "https://www.librarycat.org/lib/dispensed_snores";
  const storedData = ${dataJson};
  const fullMd = ${JSON.stringify(fullMd)};

  document.getElementById("output").innerHTML = marked.parse(fullMd);

  const related = storedData.related || [];
  if (related.length > 0) {
    const c = document.getElementById("related");
    c.innerHTML = "<h2>You Might Also Like<\/h2>";
    related.forEach(b => {
      const url = TINYCAT_BASE + "/search?search_type=title&search=" + encodeURIComponent(b.title);
      const d = document.createElement("div");
      d.className = "related-book";
      d.innerHTML =
        '<div class="rb-title">' + b.title + '<\/div>' +
        '<div class="rb-author">' + b.author + '<\/div>' +
        '<div class="rb-reason">' + b.reason + '<\/div>' +
        '<a class="rb-link" href="' + url + '" target="_blank" rel="noopener">Search in My Library \u2197<\/a>';
      c.appendChild(d);
    });
  }
<\/script>
</body>
</html>`;
  }

  // ── Main ───────────────────────────────────────────────────────────────────
  document.getElementById("generate-btn").addEventListener("click", async () => {
    const apiKey = keyInput.value.trim();
    const token  = ghToken.value.trim();
    const repo   = getRepo();

    if (!apiKey) { showNotice("Please enter your Claude API key.", "error"); return; }
    if (!title)  { showNotice("No book title found in the URL.", "error"); return; }

    localStorage.setItem("claude_api_key", apiKey);
    if (token) localStorage.setItem("gh_token", token);
    if (ghRepoInput.value.trim()) localStorage.setItem("gh_repo", ghRepoInput.value.trim());

    hideNotice();

    const btn      = document.getElementById("generate-btn");
    const skeleton = document.getElementById("skeleton");
    const output   = document.getElementById("output");
    const related  = document.getElementById("related");
    const badge    = document.getElementById("saved-badge");

    btn.disabled = true;
    badge.classList.remove("visible");
    output.classList.remove("visible");
    output.innerHTML = "";
    related.classList.remove("visible");
    related.innerHTML = "";

    // Step 1: check GitHub for an existing review
    if (token && repo) {
      setStatus("Checking for existing review…");
      try {
        const res = await ghGet(reviewFilename(title, author));
        if (res.ok) {
          const data   = await res.json();
          const raw    = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))));
          const stored = extractStoredData(raw);
          if (stored) {
            setStatus("");
            showNotice("✓ Loaded existing saved review.", "good");
            renderMarkdown(stored.review + buildFootnotesMd(stored.footnotes));
            renderRelated(stored.related);
            btn.disabled = false;
            return;
          }
        }
      } catch (e) {
        console.warn("GitHub check failed:", e);
        // Non-fatal — fall through to generate
      }
    }

    // Step 2: call Claude
    skeleton.classList.add("visible");
    setStatus("Generating review summary…");

    let parsed;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-opus-4-5",
          max_tokens: 2000,
          messages: [{ role: "user", content: buildPrompt() }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const raw  = data?.content?.[0]?.text || "";
      console.log("Raw Claude response:", raw); // visible in devtools if needed
      parsed = parseClaudeResponse(raw);

    } catch (err) {
      skeleton.classList.remove("visible");
      setStatus("");
      showNotice("Error: " + err.message, "error");
      btn.disabled = false;
      return;
    }

    skeleton.classList.remove("visible");
    setStatus("");

    const reviewMd = parsed.review    || "";
    const footnotes = parsed.footnotes || [];
    const relBooks  = parsed.related   || [];

    renderMarkdown(reviewMd + buildFootnotesMd(footnotes));
    renderRelated(relBooks);

    // Step 3: save to GitHub
    if (token && repo) {
      setStatus("Saving to GitHub…");
      try {
        const html    = buildReviewHtml(reviewMd, footnotes, relBooks);
        const saveRes = await ghPut(reviewFilename(title, author), html);
        if (saveRes.ok) {
          setStatus("");
          badge.classList.add("visible");
        } else {
          const errData = await saveRes.json().catch(() => ({}));
          showNotice("Review generated but GitHub save failed: " + (errData.message || saveRes.status), "error");
          setStatus("");
        }
      } catch (err) {
        showNotice("Review generated but save failed: " + err.message, "error");
        setStatus("");
      }
    }

    btn.disabled = false;
  });

  // Auto-trigger if credentials already saved
  // To clear local storage, run this one-liner in the browser console on your GitHub Pages domain:
  // JavaScript: ['claude_api_key','gh_token','gh_repo'].forEach(k => localStorage.removeItem(k));
  if (localStorage.getItem("claude_api_key") && title) {
    document.getElementById("generate-btn").click();
  }
</script>
</body>
</html>
