<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Reviews</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1612;
      --paper:  #f5f0e8;
      --muted:  #7a6f62;
      --rule:   #d4c9b8;
      --accent: #8b3a2a;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page {
      max-width: 660px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      border-bottom: 2px solid var(--ink);
      padding-bottom: 0.75rem;
      margin-bottom: 1.75rem;
    }
    header h1 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Book title block ── */
    #book-info {
      margin-bottom: 1.75rem;
    }
    #book-title {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.3rem;
    }
    #book-author {
      font-size: 1rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── API key row ── */
    #key-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    #key-row label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    #api-key-input {
      flex: 1;
      min-width: 180px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.9rem;
      padding: 0.4rem 0.65rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    #api-key-input:focus { border-color: var(--accent); }

    /* ── Generate button ── */
    #generate-btn {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.45rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #generate-btn:hover { opacity: 0.85; }
    #generate-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Divider ── */
    .rule {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 1.5rem 0;
    }

    /* ── Status / error ── */
    #status {
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 1.4rem;
      margin-bottom: 0.5rem;
    }
    #status.error { color: var(--accent); }

    /* ── Output ── */
    #output {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1rem;
      line-height: 1.75;
      white-space: pre-wrap;
      display: none;
    }
    #output.visible { display: block; }

    /* ── Skeleton loader ── */
    .skeleton-wrap { display: none; }
    .skeleton-wrap.visible { display: block; }
    .skel {
      height: 0.9rem;
      background: linear-gradient(90deg, var(--rule) 25%, #e8e2d6 50%, var(--rule) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 2px;
      margin-bottom: 0.65rem;
    }
    .skel.w-full  { width: 100%; }
    .skel.w-90    { width: 90%; }
    .skel.w-75    { width: 75%; }
    .skel.w-60    { width: 60%; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <h1>Book Review Summary</h1>
  </header>

  <div id="book-info">
    <div id="book-title">—</div>
    <div id="book-author"></div>
  </div>

  <div id="key-row">
    <label for="api-key-input">API Key</label>
    <input
      type="password"
      id="api-key-input"
      placeholder="sk-ant-..."
      autocomplete="off"
      spellcheck="false"
    />
    <button id="generate-btn">Get Reviews</button>
  </div>

  <hr class="rule" />

  <div id="status"></div>

  <div class="skeleton-wrap" id="skeleton">
    <div class="skel w-full"></div>
    <div class="skel w-90"></div>
    <div class="skel w-75"></div>
    <div class="skel w-full"></div>
    <div class="skel w-60"></div>
    <div class="skel w-90"></div>
    <div class="skel w-full"></div>
    <div class="skel w-75"></div>
  </div>

  <div id="output"></div>

</div>

<script>
  // ── Parse query params ──────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const title  = params.get("title")  || "";
  const author = params.get("author") || "";

  document.getElementById("book-title").textContent  = title  || "Unknown Title";
  document.getElementById("book-author").textContent = author ? "by " + author : "";

  // ── Restore saved key (session only) ──────────────────────────────────────
  const keyInput = document.getElementById("api-key-input");
  const savedKey = sessionStorage.getItem("claude_api_key");
  if (savedKey) keyInput.value = savedKey;

  // ── Generate ───────────────────────────────────────────────────────────────
  document.getElementById("generate-btn").addEventListener("click", async () => {
    const apiKey = keyInput.value.trim();
    if (!apiKey) {
      setStatus("Please enter your Claude API key.", true);
      return;
    }
    if (!title) {
      setStatus("No book title found in the URL.", true);
      return;
    }

    sessionStorage.setItem("claude_api_key", apiKey);

    const btn     = document.getElementById("generate-btn");
    const skeleton = document.getElementById("skeleton");
    const output   = document.getElementById("output");

    btn.disabled = true;
    setStatus("Generating review summary…");
    skeleton.classList.add("visible");
    output.classList.remove("visible");
    output.textContent = "";

    const bookRef = author ? `"${title}" by ${author}` : `"${title}"`;

    const prompt = `You are a knowledgeable literary critic and book reviewer. For the book ${bookRef}, please provide:

1. A brief overview of what the book is about (2–3 sentences).
2. A summary of critical reception — what reviewers and readers have generally said, covering both praise and any common criticisms (3–5 sentences).
3. Three to four representative "review voices" — short paraphrased takes in the spirit of how different types of readers or critics have responded (e.g., a literary critic, a general reader, a subject-matter enthusiast). Label each briefly.
4. A one-sentence bottom line.

Be concise, informative, and honest. If you have limited information about this specific book, say so clearly rather than speculating.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-opus-4-5",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const text = data?.content?.[0]?.text || "(No response received.)";

      skeleton.classList.remove("visible");
      setStatus("");
      output.textContent = text;
      output.classList.add("visible");

    } catch (err) {
      skeleton.classList.remove("visible");
      setStatus("Error: " + err.message, true);
    } finally {
      btn.disabled = false;
    }
  });

  // ── Auto-trigger if key already saved ─────────────────────────────────────
  if (savedKey && title) {
    document.getElementById("generate-btn").click();
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }
</script>
</body>
</html>
