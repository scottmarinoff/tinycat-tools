<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Reviews</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1612;
      --paper:  #f5f0e8;
      --muted:  #7a6f62;
      --rule:   #d4c9b8;
      --accent: #8b3a2a;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page { max-width: 660px; margin: 0 auto; }

    header {
      border-bottom: 2px solid var(--ink);
      padding-bottom: 0.75rem;
      margin-bottom: 1.75rem;
    }
    header h1 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #book-info { margin-bottom: 1.75rem; }
    #book-title {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.3rem;
    }
    #book-author { font-size: 1rem; color: var(--muted); font-style: italic; }

    .settings-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .settings-row label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      width: 6.5rem;
      flex-shrink: 0;
    }
    .settings-row input {
      flex: 1;
      min-width: 180px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.9rem;
      padding: 0.38rem 0.65rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .settings-row input:focus { border-color: var(--accent); }

    #btn-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      margin-bottom: 1.5rem;
    }
    button.action {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.45rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button.action:hover { opacity: 0.85; }
    button.action:disabled { opacity: 0.45; cursor: not-allowed; }

    #notice {
      padding: 0.6rem 0.9rem;
      border-radius: 3px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    #notice.info  { display: block; background: #e8f0fb; color: #1a4a8a; border: 1px solid #b8d0f0; }
    #notice.good  { display: block; background: #e8f5e9; color: #1b5e20; border: 1px solid #b2dfdb; }
    #notice.error { display: block; background: #fdecea; color: var(--accent); border: 1px solid #f5c6c0; }

    #status { font-size: 0.9rem; color: var(--muted); min-height: 1.4rem; margin-bottom: 0.5rem; }

    .skeleton-wrap { display: none; }
    .skeleton-wrap.visible { display: block; }
    .skel {
      height: 0.9rem;
      background: linear-gradient(90deg, var(--rule) 25%, #e8e2d6 50%, var(--rule) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 2px;
      margin-bottom: 0.65rem;
    }
    .skel.w-full { width: 100%; }
    .skel.w-90   { width: 90%; }
    .skel.w-75   { width: 75%; }
    .skel.w-60   { width: 60%; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .rule { border: none; border-top: 1px solid var(--rule); margin: 1.2rem 0; }

    /* ── Rendered markdown ── */
    #output { display: none; }
    #output.visible { display: block; }

    #output h1, #output h2, #output h3 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-weight: 700;
      margin-top: 1.6rem;
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }
    #output h1 { font-size: 1.35rem; }
    #output h2 { font-size: 1.15rem; border-bottom: 1px solid var(--rule); padding-bottom: 0.25rem; }
    #output h3 { font-size: 1rem; color: var(--muted); }
    #output p  { margin-bottom: 0.85rem; }
    #output strong { font-weight: 700; }
    #output em     { font-style: italic; }
    #output ul, #output ol { margin: 0 0 0.85rem 1.4rem; }
    #output li { margin-bottom: 0.3rem; }
    #output hr { border: none; border-top: 1px solid var(--rule); margin: 1.2rem 0; }
    #output blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      color: var(--muted);
      font-style: italic;
      margin: 0.85rem 0;
    }

    /* ── Footnotes ── */
    #output .footnotes {
      margin-top: 1.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--rule);
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
    }
    #output sup {
      font-size: 0.7rem;
      vertical-align: super;
      line-height: 0;
      color: var(--accent);
    }
    #output a { color: var(--accent); text-decoration: none; }
    #output a:hover { text-decoration: underline; }

    /* ── Related books section ── */
    #related { display: none; margin-top: 1.5rem; }
    #related.visible { display: block; }
    #related h2 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 700;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.25rem;
      margin-bottom: 0.9rem;
    }
    .related-book {
      margin-bottom: 1rem;
      padding-left: 0.75rem;
      border-left: 2px solid var(--rule);
    }
    .related-book .rb-title {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-weight: 700;
      font-size: 0.98rem;
    }
    .related-book .rb-author {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }
    .related-book .rb-reason {
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }
    .related-book .rb-link {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }
    .related-book .rb-link:hover { text-decoration: underline; }

    #saved-badge {
      display: none;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #1b5e20;
      margin-top: 1rem;
    }
    #saved-badge.visible { display: block; }
  </style>
</head>
<body>
<div class="page">

  <header><h1>Book Review Summary</h1></header>

  <div id="book-info">
    <div id="book-title">—</div>
    <div id="book-author"></div>
  </div>

  <div class="settings-row">
    <label for="api-key-input">Claude Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-…" autocomplete="off" spellcheck="false" />
  </div>
  <div class="settings-row">
    <label for="gh-token-input">GitHub Token</label>
    <input type="password" id="gh-token-input" placeholder="ghp_…" autocomplete="off" spellcheck="false" />
  </div>
  <div class="settings-row">
    <label for="gh-repo-input">GitHub Repo</label>
    <input type="text" id="gh-repo-input" placeholder="username/repo-name or full GitHub URL" autocomplete="off" spellcheck="false" />
  </div>

  <div id="btn-row">
    <button class="action" id="generate-btn">Get Reviews</button>
  </div>

  <div id="notice"></div>
  <div id="status"></div>

  <div class="skeleton-wrap" id="skeleton">
    <div class="skel w-full"></div><div class="skel w-90"></div>
    <div class="skel w-75"></div><div class="skel w-full"></div>
    <div class="skel w-60"></div><div class="skel w-90"></div>
    <div class="skel w-full"></div><div class="skel w-75"></div>
  </div>

  <hr class="rule" />
  <div id="output"></div>
  <div id="related"></div>
  <div id="saved-badge">✓ Saved to reviews/</div>

</div>
<script>
  const TINYCAT_BASE = "https://www.librarycat.org/lib/dispensed_snores";

  // ── Helpers ────────────────────────────────────────────────────────────────
  function slugify(str) {
    return str.toLowerCase()
      .replace(/[^\w\s-]/g, "")
      .replace(/\s+/g, "-")
      .replace(/-+/g, "-")
      .trim();
  }

  function reviewFilename(t, a) {
    const parts = [slugify(t)];
    if (a) parts.push(slugify(a));
    return "reviews/" + parts.join("--") + ".html";
  }

  // Strip full GitHub URL down to owner/repo if needed
  function normalizeRepo(input) {
    const m = input.trim().match(/github\.com\/([^\/]+\/[^\/]+?)(\.git)?\/?$/);
    return m ? m[1] : input.trim();
  }

  function setStatus(msg) {
    document.getElementById("status").textContent = msg;
  }

  function showNotice(msg, type) {
    const el = document.getElementById("notice");
    el.textContent = msg;
    el.className = type;
  }

  function hideNotice() {
    document.getElementById("notice").className = "";
  }

  function renderMarkdown(text) {
    const out = document.getElementById("output");
    out.innerHTML = marked.parse(text);
    out.classList.add("visible");
  }

  function tinycatSearchUrl(bookTitle) {
    return TINYCAT_BASE + "/search?search_type=title&search=" + encodeURIComponent(bookTitle);
  }

  // ── Query params ───────────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const title  = params.get("title")  || "";
  const author = params.get("author") || "";

  document.getElementById("book-title").textContent  = title  || "Unknown Title";
  document.getElementById("book-author").textContent = author ? "by " + author : "";

  // ── Restore credentials ────────────────────────────────────────────────────
  const keyInput = document.getElementById("api-key-input");
  const ghToken  = document.getElementById("gh-token-input");
  const ghRepo   = document.getElementById("gh-repo-input");

  if (sessionStorage.getItem("claude_api_key")) keyInput.value = sessionStorage.getItem("claude_api_key");
  if (sessionStorage.getItem("gh_token"))       ghToken.value  = sessionStorage.getItem("gh_token");
  if (localStorage.getItem("gh_repo"))          ghRepo.value   = localStorage.getItem("gh_repo");

  // ── GitHub API ─────────────────────────────────────────────────────────────
  function getRepo() { return normalizeRepo(ghRepo.value); }

  async function ghGet(path) {
    return fetch(`https://api.github.com/repos/${getRepo()}/contents/${path}`, {
      headers: {
        "Authorization": "Bearer " + ghToken.value.trim(),
        "Accept": "application/vnd.github+json"
      }
    });
  }

  async function ghPut(path, content) {
    const body = {
      message: `Add review: ${title}${author ? " by " + author : ""}`,
      content: btoa(unescape(encodeURIComponent(content)))
    };
    return fetch(`https://api.github.com/repos/${getRepo()}/contents/${path}`, {
      method: "PUT",
      headers: {
        "Authorization": "Bearer " + ghToken.value.trim(),
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
  }

  // ── Claude prompt ──────────────────────────────────────────────────────────
  function buildPrompt() {
    const bookRef  = author ? `"${title}" by ${author}` : `"${title}"`;
    const fiction  = "If this is fiction, recommend up to three similar novels or story collections. If nonfiction, recommend up to three related books on the same subject or theme.";
    return `You are a knowledgeable literary critic and book reviewer. For the book ${bookRef}, respond with a JSON object only — no markdown fences, no preamble — with exactly this structure:

{
  "review": "...",
  "footnotes": ["...", "..."],
  "related": [
    { "title": "...", "author": "...", "reason": "..." }
  ]
}

Rules:
- "review": A markdown string containing these four sections with ## headers:
    ## Overview
    2–3 sentences describing the book.
    ## Critical Reception
    3–5 sentences on what critics and readers have said, with inline superscript footnote references like <sup>[1]</sup> keyed to the footnotes array.
    ## Review Voices
    3–4 short paraphrased perspectives from different reader types. Bold each label (e.g. **The Literary Critic**). Include footnote refs where relevant.
    ## Bottom Line
    One sentence verdict.
- "footnotes": Array of source strings in format "Author or Outlet, Publication, Year" (e.g. "Michiko Kakutani, The New York Times, 2001"). Include only real, verifiable sources you are confident about. Omit any you are uncertain of.
- "related": Array of up to 3 objects. ${fiction} Each "reason" is one sentence explaining the connection.

If you have limited knowledge of this book, say so in the review and keep footnotes and related books to only what you are confident about.`;
  }

  // ── Render related books ───────────────────────────────────────────────────
  function renderRelated(books) {
    const container = document.getElementById("related");
    if (!books || books.length === 0) { container.classList.remove("visible"); return; }

    container.innerHTML = "<h2>You Might Also Like</h2>";
    books.forEach(b => {
      const div = document.createElement("div");
      div.className = "related-book";
      div.innerHTML = `
        <div class="rb-title">${escHtml(b.title)}</div>
        <div class="rb-author">${escHtml(b.author)}</div>
        <div class="rb-reason">${escHtml(b.reason)}</div>
        <a class="rb-link" href="${tinycatSearchUrl(b.title)}" target="_blank" rel="noopener">
          Search in My Library ↗
        </a>`;
      container.appendChild(div);
    });
    container.classList.add("visible");
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Build footnote markdown from array ────────────────────────────────────
  function buildFootnotesMarkdown(footnotes) {
    if (!footnotes || footnotes.length === 0) return "";
    const lines = footnotes.map((f, i) => `${i + 1}. ${f}`).join("\n");
    return `\n\n<div class="footnotes">\n\n${lines}\n\n</div>`;
  }

  // ── Extract stored data from saved review HTML ─────────────────────────────
  function extractStoredData(html) {
    const m = html.match(/const storedData = ({[\s\S]*?});[\s]*<\/script>/);
    if (m) { try { return JSON.parse(m[1]); } catch(e) {} }
    // Fallback: legacy format with just md string
    const md = html.match(/const md = ("[\s\S]*?");[\s]*<\/script>/);
    if (md) { try { return { review: JSON.parse(md[1]), footnotes: [], related: [] }; } catch(e) {} }
    return null;
  }

  // ── Build saved review HTML ────────────────────────────────────────────────
  function buildReviewHtml(reviewMd, footnotes, related) {
    const bookRef     = author ? `${title} by ${author}` : title;
    const dataJson    = JSON.stringify({ review: reviewMd, footnotes, related });
    const fullMd      = reviewMd + buildFootnotesMarkdown(footnotes);
    const relatedJson = JSON.stringify(related || []);

    return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Review: ${bookRef}</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"><\/script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#1a1612;--paper:#f5f0e8;--muted:#7a6f62;--rule:#d4c9b8;--accent:#8b3a2a}
    body{background:var(--paper);color:var(--ink);font-family:'Source Sans 3',sans-serif;font-size:16px;line-height:1.6;min-height:100vh;padding:2rem 1rem 4rem}
    .page{max-width:660px;margin:0 auto}
    header{border-bottom:2px solid var(--ink);padding-bottom:.75rem;margin-bottom:1.75rem}
    header h1{font-family:'Libre Baskerville',Georgia,serif;font-size:1.1rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    #output h1,#output h2,#output h3{font-family:'Libre Baskerville',Georgia,serif;font-weight:700;margin-top:1.6rem;margin-bottom:.4rem;line-height:1.3}
    #output h1{font-size:1.35rem}
    #output h2{font-size:1.15rem;border-bottom:1px solid var(--rule);padding-bottom:.25rem}
    #output h3{font-size:1rem;color:var(--muted)}
    #output p{margin-bottom:.85rem}
    #output strong{font-weight:700}
    #output em{font-style:italic}
    #output ul,#output ol{margin:0 0 .85rem 1.4rem}
    #output li{margin-bottom:.3rem}
    #output hr{border:none;border-top:1px solid var(--rule);margin:1.2rem 0}
    #output blockquote{border-left:3px solid var(--accent);padding-left:1rem;color:var(--muted);font-style:italic;margin:.85rem 0}
    #output sup{font-size:.7rem;vertical-align:super;line-height:0;color:var(--accent)}
    #output a{color:var(--accent);text-decoration:none}
    #output a:hover{text-decoration:underline}
    .footnotes{margin-top:1.5rem;padding-top:.75rem;border-top:1px solid var(--rule);font-size:.82rem;color:var(--muted);line-height:1.5}
    #related{margin-top:1.5rem}
    #related h2{font-family:'Libre Baskerville',Georgia,serif;font-size:1.15rem;font-weight:700;border-bottom:1px solid var(--rule);padding-bottom:.25rem;margin-bottom:.9rem}
    .related-book{margin-bottom:1rem;padding-left:.75rem;border-left:2px solid var(--rule)}
    .rb-title{font-family:'Libre Baskerville',Georgia,serif;font-weight:700;font-size:.98rem}
    .rb-author{font-size:.88rem;color:var(--muted);margin-bottom:.2rem}
    .rb-reason{font-size:.9rem;margin-bottom:.3rem}
    .rb-link{font-size:.8rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);text-decoration:none}
    .rb-link:hover{text-decoration:underline}
    .meta{font-size:.8rem;color:var(--muted);margin-top:2rem}
  </style>
</head>
<body>
<div class="page">
  <header><h1>Book Review Summary</h1></header>
  <div id="output"></div>
  <div id="related"></div>
  <p class="meta">Generated ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}</p>
</div>
<script>
  const TINYCAT_BASE = "https://www.librarycat.org/lib/dispensed_snores";
  const storedData = ${dataJson};
  const fullMd = ${JSON.stringify(fullMd)};
  const related = ${relatedJson};

  document.getElementById("output").innerHTML = marked.parse(fullMd);

  if (related && related.length > 0) {
    const container = document.getElementById("related");
    container.innerHTML = "<h2>You Might Also Like<\/h2>";
    related.forEach(b => {
      const url = TINYCAT_BASE + "/search?search_type=title&search=" + encodeURIComponent(b.title);
      const div = document.createElement("div");
      div.className = "related-book";
      div.innerHTML =
        '<div class="rb-title">' + b.title + '<\/div>' +
        '<div class="rb-author">' + b.author + '<\/div>' +
        '<div class="rb-reason">' + b.reason + '<\/div>' +
        '<a class="rb-link" href="' + url + '" target="_blank" rel="noopener">Search in My Library \u2197<\/a>';
      container.appendChild(div);
    });
  }
<\/script>
</body>
</html>`;
  }

  // ── Main ───────────────────────────────────────────────────────────────────
  document.getElementById("generate-btn").addEventListener("click", async () => {
    const apiKey = keyInput.value.trim();
    const token  = ghToken.value.trim();
    const repo   = getRepo();

    if (!apiKey) { showNotice("Please enter your Claude API key.", "error"); return; }
    if (!title)  { showNotice("No book title found in the URL.", "error"); return; }

    sessionStorage.setItem("claude_api_key", apiKey);
    if (token) sessionStorage.setItem("gh_token", token);
    if (ghRepo.value.trim()) localStorage.setItem("gh_repo", ghRepo.value.trim());

    hideNotice();

    const btn      = document.getElementById("generate-btn");
    const skeleton = document.getElementById("skeleton");
    const output   = document.getElementById("output");
    const related  = document.getElementById("related");
    const badge    = document.getElementById("saved-badge");

    btn.disabled = true;
    badge.classList.remove("visible");
    output.classList.remove("visible");
    output.innerHTML = "";
    related.classList.remove("visible");
    related.innerHTML = "";

    // Step 1: check GitHub for existing review
    if (token && repo) {
      setStatus("Checking for existing review…");
      try {
        const res = await ghGet(reviewFilename(title, author));
        if (res.status === 200) {
          const data = await res.json();
          const raw  = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))));
          const stored = extractStoredData(raw);
          if (stored) {
            setStatus("");
            showNotice("✓ Loaded existing saved review.", "good");
            const fullMd = stored.review + buildFootnotesMarkdown(stored.footnotes);
            renderMarkdown(fullMd);
            renderRelated(stored.related);
            btn.disabled = false;
            return;
          }
        }
      } catch (e) { /* non-fatal */ }
    }

    // Step 2: call Claude
    skeleton.classList.add("visible");
    setStatus("Generating review summary…");

    let parsed = null;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-opus-4-5",
          max_tokens: 1500,
          messages: [{ role: "user", content: buildPrompt() }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const raw  = data?.content?.[0]?.text || "";

      // Strip any accidental markdown fences before parsing
      const clean = raw.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/, "").trim();
      parsed = JSON.parse(clean);

    } catch (err) {
      skeleton.classList.remove("visible");
      setStatus("");
      showNotice("Error: " + err.message, "error");
      btn.disabled = false;
      return;
    }

    skeleton.classList.remove("visible");
    setStatus("");

    const reviewMd = parsed.review    || "";
    const footnotes = parsed.footnotes || [];
    const relBooks  = parsed.related   || [];

    const fullMd = reviewMd + buildFootnotesMarkdown(footnotes);
    renderMarkdown(fullMd);
    renderRelated(relBooks);

    // Step 3: save to GitHub
    if (token && repo) {
      setStatus("Saving to GitHub…");
      try {
        const html    = buildReviewHtml(reviewMd, footnotes, relBooks);
        const saveRes = await ghPut(reviewFilename(title, author), html);
        if (saveRes.ok) {
          setStatus("");
          badge.classList.add("visible");
        } else {
          const errData = await saveRes.json().catch(() => ({}));
          showNotice("Review generated but GitHub save failed: " + (errData.message || saveRes.status), "error");
          setStatus("");
        }
      } catch (err) {
        showNotice("Review generated but save failed: " + err.message, "error");
        setStatus("");
      }
    }

    btn.disabled = false;
  });

  // Auto-trigger if credentials already saved
  if (sessionStorage.getItem("claude_api_key") && title) {
    document.getElementById("generate-btn").click();
  }
</script>
</body>
</html>
